<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">OpnForm live demo preview</title>
  <desc id="desc">Abstract blue preview background used as a fallback for the live demo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="52%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="900" cy="170" r="210" fill="#bfdbfe" opacity=".7" filter="url(#soft)"/>
  <circle cx="230" cy="650" r="250" fill="#c7d2fe" opacity=".55" filter="url(#soft)"/>
  <g opacity=".42">
    <path d="M162 150h876" stroke="#2563eb" stroke-width="2" stroke-dasharray="5 28"/>
    <path d="M162 250h876" stroke="#2563eb" stroke-width="2" stroke-dasharray="5 28"/>
    <path d="M162 350h876" stroke="#2563eb" stroke-width="2" stroke-dasharray="5 28"/>
    <path d="M162 450h876" stroke="#2563eb" stroke-width="2" stroke-dasharray="5 28"/>
    <path d="M162 550h876" stroke="#2563eb" stroke-width="2" stroke-dasharray="5 28"/>
  </g>
  <rect x="320" y="210" width="560" height="360" rx="42" fill="#fff" opacity=".78"/>
  <rect x="365" y="265" width="250" height="28" rx="14" fill="#bfdbfe"/>
  <rect x="365" y="330" width="470" height="72" rx="18" fill="#dbeafe"/>
  <rect x="365" y="426" width="390" height="72" rx="18" fill="#e0f2fe"/>
  <rect x="365" y="526" width="170" height="24" rx="12" fill="url(#accent)"/>
</svg>
