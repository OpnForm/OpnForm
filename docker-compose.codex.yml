services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${CODEX_DB_NAME}
      POSTGRES_USER: ${CODEX_DB_USERNAME}
      POSTGRES_PASSWORD: ${CODEX_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "127.0.0.1:${CODEX_DB_PORT}:5432"
    volumes:
      - codex-postgres-data:/var/lib/postgresql/data

volumes:
  codex-postgres-data:
